name: PHP Composer

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        php-version: [8.1, 8.2, 8.3, 8.4, 8.5]

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}

    - name: Validate composer.json and composer.lock
      run: composer validate

    - name: Check for composer.lock
      run: |
        if [ -f composer.lock ]; then
          echo "composer.lock present"
        else
          echo "WARNING: composer.lock is missing. Commit a composer.lock for reproducible CI installs." >&2
        fi

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      if: steps.composer-cache.outputs.cache-hit != 'true'
      run: composer install --prefer-dist --no-progress --no-suggest

    - name: Install compatible PHPUnit for PHP version
      run: |
        VER=$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;')
        echo "Detected PHP version: $VER"
        if [[ "$VER" == 7.* ]]; then
          composer require --dev phpunit/phpunit:"^8.5.52" --no-interaction --no-progress
        elif [[ "$VER" == "8.0" ]]; then
          composer require --dev phpunit/phpunit:"^9.5" --no-interaction --no-progress
        else
          composer require --dev phpunit/phpunit:"^10.0" --no-interaction --no-progress
        fi

    # Add a test script to composer.json, for instance: "test": "vendor/bin/phpunit"
    # Docs: https://getcomposer.org/doc/articles/scripts.md

    - name: Run test suite
      run: composer run-script test
